<a [routerLink]="['/events', event.id]" class="event-card">
  <div class="event-card__thumb" [style.background]="gradient">
    <span class="event-card__category-pill">{{ event.categoryName }}</span>
  </div>
  <div class="event-card__body">
    <h3 class="event-card__title">{{ event.title }}</h3>
    <div class="event-card__meta">
      <span>📅 {{ formatDate(event.startTime) }} · {{ formatTime(event.startTime) }}</span>
      <span>📍 {{ event.venueCity || event.venueName }}</span>
    </div>
    <div class="event-card__footer">
      <span class="event-card__organizer">{{ event.organizerName }}</span>
      <span class="event-card__seats">{{ event.capacity }} seats</span>
    </div>
  </div>
</a>
